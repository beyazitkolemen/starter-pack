# Blog API Endpoints

# List Blogs
get:
  tags:
    - Blog
  summary: Blog listesini getir
  description: Filtreleme ve sayfalama ile blog listesi
  parameters:
    - name: page
      in: query
      description: Sayfa numarası
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
    - name: per_page
      in: query
      description: Sayfa başına blog sayısı
      required: false
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
    - name: status
      in: query
      description: Blog durumu
      required: false
      schema:
        type: string
        enum: [draft, published, archived]
    - name: category_id
      in: query
      description: Kategori ID'si
      required: false
      schema:
        type: integer
    - name: tag_id
      in: query
      description: Tag ID'si
      required: false
      schema:
        type: integer
    - name: search
      in: query
      description: Arama terimi
      required: false
      schema:
        type: string
    - name: featured
      in: query
      description: Sadece öne çıkan blog'lar
      required: false
      schema:
        type: boolean
    - name: popular
      in: query
      description: Sadece popüler blog'lar
      required: false
      schema:
        type: boolean
  responses:
    '200':
      description: Blog listesi başarıyla getirildi
      content:
        application/json:
          schema:
            $ref: '../schemas/blog-list-response.yaml'
    '500':
      description: Server hatası
      content:
        application/json:
          schema:
            $ref: '../schemas/server-error.yaml'
