# Blog Detail Operations

# Get Single Blog
get:
  tags:
    - Blog
  summary: Tek blog getir
  description: Slug ile blog detayını getir
  parameters:
    - name: slug
      in: path
      description: Blog slug'ı
      required: true
      schema:
        type: string
      example: "laravel-ile-ddd-mimarisi"
  responses:
    '200':
      description: Blog başarıyla getirildi
      content:
        application/json:
          schema:
            $ref: '../schemas/blog-response.yaml'
    '404':
      description: Blog bulunamadı
      content:
        application/json:
          schema:
            $ref: '../schemas/not-found-error.yaml'
    '500':
      description: Server hatası
      content:
        application/json:
          schema:
            $ref: '../schemas/server-error.yaml'

# Update Blog
put:
  tags:
    - Blog
  summary: Blog güncelle
  description: Kullanıcı girişi yapılmış olmalı
  security:
    - bearerAuth: []
  parameters:
    - name: blogId
      in: path
      description: Blog ID'si
      required: true
      schema:
        type: integer
      example: 1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/blog-update.yaml'
        example:
          title: "Güncellenmiş Blog Başlığı"
          content: "Güncellenmiş blog içeriği..."
          category_id: 2
          excerpt: "Güncellenmiş özet"
          tags: [1, 4, 5]
          status: "published"
  responses:
    '200':
      description: Blog başarıyla güncellendi
      content:
        application/json:
          schema:
            $ref: '../schemas/blog-response.yaml'
    '400':
      description: Validation hatası
      content:
        application/json:
          schema:
            $ref: '../schemas/validation-error.yaml'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../schemas/unauthorized-error.yaml'
    '404':
      description: Blog bulunamadı
      content:
        application/json:
          schema:
            $ref: '../schemas/not-found-error.yaml'
    '500':
      description: Server hatası
      content:
        application/json:
          schema:
            $ref: '../schemas/server-error.yaml'

# Delete Blog
delete:
  tags:
    - Blog
  summary: Blog sil
  description: Kullanıcı girişi yapılmış olmalı
  security:
    - bearerAuth: []
  parameters:
    - name: blogId
      in: path
      description: Blog ID'si
      required: true
      schema:
        type: integer
      example: 1
  responses:
    '200':
      description: Blog başarıyla silindi
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                example: "success"
              message:
                type: string
                example: "Blog başarıyla silindi"
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../schemas/unauthorized-error.yaml'
    '404':
      description: Blog bulunamadı
      content:
        application/json:
          schema:
            $ref: '../schemas/not-found-error.yaml'
    '500':
      description: Server hatası
      content:
        application/json:
          schema:
            $ref: '../schemas/server-error.yaml'
